name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AutoTapper-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Publish Rolling Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="debug-latest"
          RELEASE_TITLE="AutoTapper Latest Debug APK"
          RELEASE_NOTES="Automated debug APK build for commit ${GITHUB_SHA}."
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk#AutoTapper-debug.apk"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release delete "$TAG_NAME" --cleanup-tag --yes
          fi

          gh release create "$TAG_NAME" "$APK_PATH" \
            --title "$RELEASE_TITLE" \
            --notes "$RELEASE_NOTES" \
            --target "$GITHUB_SHA" \
            --latest
